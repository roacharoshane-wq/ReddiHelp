name: MobileApp
description: A new Flutter project for ReddiHelp Platform.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.2.0'

dependencies:
  flutter:
    sdk: flutter

  
  geocoding: ^2.1.1
  http: ^1.1.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  font_awesome_flutter: ^10.6.0
  intl: ^0.18.1
  provider: ^6.1.1
  flutter_map_geojson2: ^1.0.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3
  url_launcher: ^6.3.0
  firebase_auth: ^5.5.0
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.10
  socket_io_client: ^3.0.2
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  speech_to_text: ^7.3.0
  pdf: ^3.10.8
  printing: ^5.10.0
  screenshot: ^2.1.0
  flutter_map_tile_caching: ^10.1.1

  
dev_dependencies:
  flutter_test:
    sdk: flutter  # ✅ No semicolon here
  
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/geojson/jamaica_parishes.geojson
    - assets/data/incident_instructions.json